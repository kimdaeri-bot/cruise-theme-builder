<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>크루즈나라 — Bold Theme</title>
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header-wrap"></div>
  <div id="hero-wrap"></div>

  <section class="section" id="products">
    <div class="container">
      <div class="section-title">
        <h2>🔥 지금 바로 떠나자!</h2>
        <p>한정 특가, 지금 아니면 늦습니다</p>
      </div>
      <div class="cards-grid" id="cards-wrap"></div>
    </div>
  </section>

  <div id="partners-wrap"></div>
  <div id="cta-wrap"></div>
  <div id="footer-wrap"></div>

  <script src="../../agency-config.js"></script>
  <script src="../../shared/cruise-data.js"></script>
  <script src="../../shared/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('header-wrap').innerHTML = renderHeader();
      document.getElementById('hero-wrap').innerHTML = renderHero();
      document.getElementById('cards-wrap').innerHTML = renderCruiseCards(3);
      document.getElementById('partners-wrap').innerHTML = renderPartners();
      document.getElementById('cta-wrap').innerHTML = renderCTA();
      document.getElementById('footer-wrap').innerHTML = renderFooter();
    });
  </script>
</body>
</html>
